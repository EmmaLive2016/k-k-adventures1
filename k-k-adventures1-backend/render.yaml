services:
  - type: web
    name: k-k-adventures1-fastapi
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: k-k-adventures1-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-k-k-frontend.netlify.app
      - key: CHANNELS
        value: k-k-adventures1
      - key: STREAM_RECREATE_ON_START
        value: true

databases:
  - name: k-k-adventures1-postgres
    databaseName: k_k_adventures1
    user: kk_user
